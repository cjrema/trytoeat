<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>시식가이드</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --bg: #FAFAF7;
    --ink: #1F2E22;
    --muted: #767065;
    --line: #E6E1D6;
    --card: #FFFFFF;
    --accent: #E8622C;
    --accent-ink: #FFFFFF;
    --chip-inactive: #FFFFFF;
    --shadow: 0 2px 10px rgba(31,46,34,0.06);
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a{ text-decoration:none; color:inherit; }
  button{ font-family: inherit; }

  .top{
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--line);
  }
  .top h1{
    margin: 0 0 4px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .top .sub{
    margin: 0 0 16px;
    font-size: 15px;
    color: var(--muted);
    font-weight: 500;
  }
  .top-actions{
    display:flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .action-btn{
    display:flex;
    align-items:center;
    gap: 6px;
    flex: 1;
    justify-content:center;
    padding: 11px 10px;
    border-radius: 12px;
    border: 2px solid var(--line);
    background: #fff;
    color: var(--ink);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .action-btn:active{ transform: scale(0.97); }
  .action-btn.notice{
    border-color: var(--accent);
    color: var(--accent);
  }
  .search-wrap{
    position: relative;
    margin-bottom: 14px;
  }
  .search-wrap input{
    width: 100%;
    padding: 15px 18px 15px 46px;
    font-size: 17px;
    font-weight: 600;
    border-radius: 14px;
    border: 2px solid var(--line);
    background: #fff;
    color: var(--ink);
    outline: none;
  }
  .search-wrap input:focus{
    border-color: var(--accent);
  }
  .search-wrap input::placeholder{ color: #B3AC9E; font-weight: 500; }
  .search-icon{
    position:absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    opacity: 0.6;
  }
  .cats{
    display:flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .cats::-webkit-scrollbar{ display:none; }
  .chip{
    flex: 0 0 auto;
    padding: 11px 18px;
    border-radius: 999px;
    border: 2px solid var(--line);
    background: var(--chip-inactive);
    color: var(--ink);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
  }
  .chip:active{ transform: scale(0.96); }
  .chip.active{
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }

  main{ padding: 18px; max-width: 720px; margin: 0 auto; }

  .grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 380px){
    .grid{ grid-template-columns: 1fr; }
  }

  .card{
    display: block;
    background: var(--card);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--line);
    transition: transform 0.1s ease;
  }
  .card:active{ transform: scale(0.98); }

  .card-media{
    width: 100%;
    aspect-ratio: 4 / 3;
    background: #F1EEE5;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 44px;
    position: relative;
    overflow: hidden;
  }
  .card-media img{
    width: 100%; height: 100%; object-fit: cover;
  }
  .badge{
    position:absolute;
    top: 8px;
    left: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    padding: 4px 9px;
    border-radius: 999px;
  }
  .card-body{ padding: 14px 14px 16px; }
  .card-cat{
    display:inline-block;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    background: #F1EEE5;
    padding: 3px 9px;
    border-radius: 999px;
    margin-bottom: 8px;
  }
  .card-name{
    font-size: 18px;
    font-weight: 800;
    line-height: 1.35;
    margin: 0 0 12px;
    color: var(--ink);
    min-height: 2.7em;
  }
  .card-cta{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 6px;
    width: 100%;
    padding: 13px 0;
    background: var(--accent);
    color: var(--accent-ink);
    font-size: 15px;
    font-weight: 800;
    border-radius: 12px;
  }

  .empty{
    text-align:center;
    padding: 70px 20px;
    color: var(--muted);
  }
  .empty .emoji{ font-size: 40px; margin-bottom: 12px; }
  .empty p{ font-size: 16px; font-weight: 600; margin: 0; }
</style>
</head>
<body>

<header class="top">
  <div class="top-actions">
    <button id="homeBtn" class="action-btn" type="button">🏠 메인으로</button>
    <a id="noticeBtn" class="action-btn notice" href="#">📋 알림장 바로가기</a>
  </div>
  <h1>시식가이드</h1>
  <p class="sub">제품을 눌러 시식가이드를 확인하세요</p>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="searchInput" type="text" placeholder="제품 이름으로 검색" />
  </div>
  <nav class="cats" id="catNav"></nav>
</header>

<main>
  <div class="grid" id="productGrid"></div>
  <div class="empty" id="emptyState" hidden>
    <div class="emoji">🔎</div>
    <p>찾으시는 제품이 없어요</p>
  </div>
</main>

<script>
/* ============================================================
   📝 제품 추가/수정 방법 (코드 담당자용)

   1) 아래 CATEGORIES 배열에 카테고리명을 원하는 순서대로 적어주세요.
      ('전체' 탭은 자동으로 맨 앞에 생깁니다)

   2) PRODUCTS 배열에 아래 형식으로 한 줄씩 추가하면 화면에 자동으로 나타납니다.

      {
        name: '제품 이름',              // 필수
        category: '라면류',             // 필수 - 반드시 CATEGORIES 안에 있는 이름과 똑같이 적어주세요
        link: 'https://...',            // 필수 - 이 제품의 시식가이드 링크
        image: 'https://...jpg',        // 선택 - 없으면 아래 emoji가 대신 보여요
        emoji: '🍜',                    // 선택 - image가 없을 때 보여줄 아이콘
        badge: '신제품'                  // 선택 - 왼쪽 위에 작은 표시가 붙어요. 필요없으면 이 줄을 지우세요
      }

   3) 제품이 아무리 많아져도(수백 개) 그대로 추가만 하면 됩니다.
      화면 위쪽 검색창과 카테고리 탭이 자동으로 필터링해줍니다.
============================================================ */

// 📋 '알림장 바로가기' 버튼이 이동할 주소 - 실제 링크로 바꿔주세요
const NOTICE_LINK = 'https://cjmd1.my.canva.site/6390';

// 🏠 '메인으로' 버튼을 눌렀을 때 이동할 메인페이지 주소
const MAIN_PAGE_URL = 'index.html';

const CATEGORIES = ['만두', '치킨', '냉동반찬', '조리육', '소스&면', '김치', '기타', '국물요리', '창고형'];

const PRODUCTS = [
  { name: '큰채소가득 고기만두', category: '만두', emoji: '🥟', link: 'https://cjmd1.my.canva.site/bigmandu', badge: '인기', image: 'https://img.cjthemarket.com/images/file/product/384/20251210083038154.jpg?SF=webp&RS=550'},
  { name: '유용욱 갈비만두', category: '만두', emoji: '🥟', link: 'https://cjmd1.my.canva.site/dahokfsitkq', badge: '신제품', image: 'https://img.cjthemarket.com/images/file/product/938/20260713122953639.jpg?SF=webp&RS=550' },
  { name: '비비고 왕교자', category: '만두', emoji: '🥟', link: 'https://cjmd1.my.canva.site/dhkdrywk' , image: 'https://img.cjthemarket.com/images/file/product/20260319/217_212217_5.jpg?SF=webp&RS=550' },
  { name: '진한 고기만두', category: '만두', emoji: '🥟', link: 'https://cjmd1.my.canva.site/mandu1', image: 'https://img.cjthemarket.com/images/file/product/506/20260409140029873.jpg?SF=webp&RS=550' },
  { name: '딤섬 새우하가우', category: '만두', emoji: '🥟', link: 'https://cjmd1.my.canva.site/tltlr-todngkrkdn', image: 'https://img.cjthemarket.com/images/file/product/20260102/554_206554_5.jpg?SF=webp&RS=550' },
  { name: '소바바 치킨', category: '치킨', emoji: '🐓', link: 'https://cjmd1.my.canva.site/sobaba1', badge: '인기', image:'https://img.cjthemarket.com/images/file/product/775/20260323083547100.jpg?SF=webp&RS=550' },
  { name: 'CJ 닭강정', category: '치킨', emoji: '🐓', link: 'https://cjmd1.my.canva.site/chicken-gangjeong', image:'https://img.cjthemarket.com/images/file/product/562/20260320082629632.jpg?SF=webp&RS=550' },
  { name: '비후베: 비엔나, 후랑크, 베이컨', category: '조리육', emoji: '🍖', link: 'https://cjmd1.my.canva.site/sausage',image: 'https://img.cjthemarket.com/images/file/product/20260128/592_162592_5.jpg?SF=webp&RS=550' },
  { name: '밥 싸먹는 햄', category: '조리육', emoji: '🍖', link: 'https://cjmd1.my.canva.site/qkqtkajrsmsgoa', image:'https://img.cjthemarket.com/images/file/product/20260121/848_214848_5.jpg?SF=webp&RS=550' },
  { name: '슬라이스 씬', category: '조리육', emoji: '🍖', link: 'https://cjmd1.my.canva.site/tmftls',image:'https://img.cjthemarket.com/images/file/product/839/20260611171444706.jpg?SF=webp&RS=550' },
  { name: '두툼한 굿 베이컨', category: '조리육', emoji: '🍖', link: 'https://cjmd1.my.canva.site/rntqpdlzjs', image:'https://img.cjthemarket.com/images/file/product/20260128/996_207996_5.jpg?SF=webp&RS=550' },
  { name: '육즙가득 떡갈비', category: '냉동반찬', emoji: '🟧', link: 'https://cjmd1.my.canva.site/tltlr-ejrrkfql',image:'https://img.cjthemarket.com/images/file/product/627/20260318222821625.jpg?SF=webp&RS=550' },
  { name: '도톰 동그랑땡', category: '냉동반찬', emoji: '🟧', link: 'https://cjmd1.my.canva.site/ddaeng1', image:'https://img.cjthemarket.com/images/file/product/20260114/393_201393_5.jpg?SF=webp&RS=550' },
  { name: '생선구이류', category: '기타', emoji: '🟧', link: 'https://cjmd1.my.canva.site/todtjsrndl', image:'https://img.cjthemarket.com/images/file/product/595/20260318111216662.jpg?SF=webp&RS=550' },
  { name: '더건강한 직화구이햄', category: '조리육', emoji: '🍖', link: 'https://cjmd1.my.canva.site/sausage' },
  { name: '비비고 영양삼계탕', category: '국물요리', emoji: '🐓', link: 'https://cjmd1.my.canva.site/tkarpxkd', image:'https://img.cjthemarket.com/images/file/product/417/20260518165518402.jpg?SF=webp&RS=550' },
  { name: '흑백요리사 황태국', category: '국물요리', emoji: '🟧', link: 'https://cjmd1.my.canva.site/gmrqorrnrxkd', image:'https://img.cjthemarket.com/images/file/product/448/20260115173213902.jpg?SF=webp&RS=550' },
  { name: '습 맵찔이 실비김치', category: '김치', emoji: '🟧', link: 'https://cjmd1.my.canva.site/kimchi1', image:'https://img.cjthemarket.com/images/file/product/20260107/695_215695_5.jpg?SF=webp&RS=550' },
  { name: '습 실피 파김치', category: '김치', emoji: '🟧', link: 'https://cjmd1.my.canva.site/kimchi2', image:'https://img.cjthemarket.com/images/file/product/20260107/204_215204_5.jpg?SF=webp&RS=550' },
  { name: '백설 파스타소스', category: '소스&면', emoji: '🍝', link: 'https://cjmd1.my.canva.site/pasta', image:'https://img.cjthemarket.com/images/file/product/221/20260625132547704.png?SF=webp&RS=550' },
  { name: 'Calvo 칼보 참치', category: '기타', emoji: '🐟', link: 'https://cjmd1.my.canva.site/zkfqh', badge: '신제품', image:'https://img.cjthemarket.com/images/file/product/049/20260708180556246.jpg?SF=webp&RS=550' },
  { name: '코스트코', category: '창고형', emoji: '😎', link: 'https://cjmd1.my.canva.site/cc' },
  { name: '트레이더스', category: '창고형', emoji: '😎', link: 'https://cjmd1.my.canva.site/tr' },
  
  
  
];

// ------------------------------------------------------------
// 아래부터는 화면을 그려주는 코드입니다. (수정하지 않아도 됩니다)
// ------------------------------------------------------------

let activeCategory = '전체';
let searchTerm = '';

// 메인페이지의 검색창/카테고리 바로가기에서 넘어온 값이 있으면 반영합니다.
const urlParams = new URLSearchParams(window.location.search);
const qParam = urlParams.get('q');
const catParam = urlParams.get('cat');
if(catParam && ['전체', ...CATEGORIES].includes(catParam)){
  activeCategory = catParam;
}
if(qParam){
  searchTerm = qParam;
}

const catNav = document.getElementById('catNav');
const grid = document.getElementById('productGrid');
const emptyState = document.getElementById('emptyState');
const searchInput = document.getElementById('searchInput');
if(searchTerm) searchInput.value = searchTerm;

function renderChips(){
  const all = ['전체', ...CATEGORIES];
  catNav.innerHTML = all.map(cat =>
    `<button class="chip ${cat === activeCategory ? 'active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');
  catNav.querySelectorAll('.chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      renderChips();
      renderGrid();
    });
  });
}

function renderGrid(){
  const filtered = PRODUCTS.filter(p => {
    const matchesCat = activeCategory === '전체' || p.category === activeCategory;
    const matchesSearch = p.name.toLowerCase().includes(searchTerm.toLowerCase());
    return matchesCat && matchesSearch;
  });

  if(filtered.length === 0){
    grid.innerHTML = '';
    emptyState.hidden = false;
    return;
  }
  emptyState.hidden = true;

  grid.innerHTML = filtered.map(p => `
    <a class="card" href="${p.link}">
      <div class="card-media">
        ${p.badge ? `<span class="badge">${p.badge}</span>` : ''}
        ${p.image ? `<img src="${p.image}" alt="${p.name}" />` : `<span>${p.emoji || '🍽️'}</span>`}
      </div>
      <div class="card-body">
        <span class="card-cat">${p.category}</span>
        <p class="card-name">${p.name}</p>
        <div class="card-cta">시식가이드 보기 →</div>
      </div>
    </a>
  `).join('');
}

searchInput.addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderGrid();
});

document.getElementById('noticeBtn').href = NOTICE_LINK;

document.getElementById('homeBtn').addEventListener('click', () => {
  window.location.href = MAIN_PAGE_URL;
});

renderChips();
renderGrid();
</script>

</body>
</html>
